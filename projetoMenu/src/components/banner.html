<section 
  class="relative bg-slate-950 lg:h-screen lg:flex lg:items-center overflow-hidden cursor-grab active:cursor-grabbing"
  x-data="{ 
    activeSlide: 0, 
    slides: [
      { 
        title: 'Vestidos de Festa <span class=\'text-indigo-400\'>Exclusivos</span>', 
        text: 'Encontre o modelo perfeito para brilhar em casamentos, formaturas e eventos especiais.',
        img: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?q=80&w=1200&auto=format&fit=crop'
      },
      { 
        title: 'Estilo Casual <span class=\'text-indigo-400\'>e Conforto</span>', 
        text: 'Vestidos versáteis para o dia a dia, trabalho ou um passeio no fim de semana.',
        img: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1200&auto=format&fit=crop'
      },
      { 
        title: 'Vestidos de <span class=\'text-indigo-400\'>Gala Noturnos</span>', 
        text: 'Brilhos e silhuetas marcantes para noites inesquecíveis.',
        img: 'https://images.unsplash.com/photo-1568252542512-9fe8fe9c87bb?q=80&w=1200&auto=format&fit=crop'
      },
      { 
        title: 'Tendência <span class=\'text-indigo-400\'>Boho Chic</span>', 
        text: 'O equilíbrio perfeito entre liberdade, texturas e personalidade.',
        img: 'https://images.unsplash.com/photo-1502716119720-b23a93e5fe1b?q=80&w=1200&auto=format&fit=crop'
      }
    ],
    touchStartX: 0,
    touchEndX: 0,
    next() {
        this.activeSlide = (this.activeSlide === this.slides.length - 1) ? 0 : this.activeSlide + 1;
    },
    prev() {
        this.activeSlide = (this.activeSlide === 0) ? this.slides.length - 1 : this.activeSlide - 1;
    },
    handleDrag() {
        let distance = this.touchStartX - this.touchEndX;
        if (Math.abs(distance) > 50) { // Sensibilidade do arrasto
            distance > 0 ? this.next() : this.prev();
        }
    }
  }"
  x-init="setInterval(() => { next() }, 5000)"
  @mousedown="touchStartX = $event.screenX"
  @mouseup="touchEndX = $event.screenX; handleDrag()"
>
  <template x-for="(slide, index) in slides" :key="index">
    <div 
      x-show="activeSlide === index"
      x-transition:enter="transition ease-out duration-1000"
      x-transition:enter-start="opacity-0 scale-105"
      x-transition:enter-end="opacity-100 scale-100"
      x-transition:leave="transition ease-in duration-500"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="absolute inset-0 z-0 pointer-events-none"
    >
      <img :src="slide.img" class="h-full w-full object-cover opacity-60 select-none" alt="Vestido feminino">
    </div>
  </template>

  <div class="relative z-10 mx-auto w-screen max-w-7xl px-4 py-16 sm:px-6 sm:py-24 lg:px-8 lg:py-32 select-none pointer-events-none">
    <div class="mx-auto max-w-prose text-center pointer-events-auto">
      <h1 class="text-4xl font-bold text-white sm:text-5xl drop-shadow-md" x-html="slides[activeSlide].title"></h1>
      <p class="mt-4 text-base text-gray-100 sm:text-lg/relaxed drop-shadow-sm" x-text="slides[activeSlide].text"></p>

      <div class="mt-4 flex justify-center gap-4 sm:mt-6">
        <a class="inline-block rounded border border-indigo-600 bg-indigo-600 px-5 py-3 font-medium text-white shadow-sm hover:bg-indigo-700 transition-colors" href="#">Ver Coleção</a>
        <a class="inline-block rounded border border-gray-200 px-5 py-3 font-medium text-white shadow-sm hover:bg-white hover:text-gray-900 transition-colors" href="#">Saiba Mais</a>
      </div>
    </div>

    <div class="mt-8 flex justify-center gap-2 pointer-events-auto">
      <template x-for="(slide, index) in slides" :key="index">
        <button 
          @click="activeSlide = index" 
          class="h-2 w-8 rounded-full transition-all"
          :class="activeSlide === index ? 'bg-indigo-600 w-12' : 'bg-gray-400'"
        ></button>
      </template>
    </div>
  </div>

  <button @click="prev()" class="absolute left-4 top-1/2 -translate-y-1/2 z-20 p-2 text-white hover:text-indigo-400 transition-colors hidden lg:block">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
  </button>
  <button @click="next()" class="absolute right-4 top-1/2 -translate-y-1/2 z-20 p-2 text-white hover:text-indigo-400 transition-colors hidden lg:block">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
  </button>
</section>
